<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vienta Kennisbank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#0F3D47',
              DEFAULT: '#1A5F6E',
              light: '#2A8FA8',
              accent: '#E8A020',
              'accent-dark': '#C4841A',
            },
            surface: '#F4F6F7',
            ink: {
              DEFAULT: '#1C2327',
              muted: '#5A6472',
              subtle: '#8E97A0',
            }
          },
          fontFamily: {
            display: ['"DM Serif Display"', 'Georgia', 'serif'],
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            card: '0 1px 3px rgba(15,61,71,0.06), 0 4px 16px rgba(15,61,71,0.08)',
            float: '0 8px 32px rgba(15,61,71,0.14), 0 2px 8px rgba(15,61,71,0.08)',
            search: '0 4px 24px rgba(15,61,71,0.12), 0 1px 4px rgba(15,61,71,0.08)',
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --sidebar-w: 260px;
      --brand-dark: #0F3D47;
      --brand: #1A5F6E;
      --accent: #E8A020;
      --surface: #F4F6F7;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--surface);
      color: #1C2327;
      margin: 0;
      overflow: hidden;
      height: 100vh;
    }

    /* === SIDEBAR === */
    #sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: linear-gradient(165deg, #0C3540 0%, #1A5F6E 55%, #1D6B7C 100%);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    #sidebar::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 0;
    }

    #sidebar::after {
      content: '';
      position: absolute;
      top: -80px;
      right: -80px;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(232,160,32,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .sidebar-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      scrollbar-width: none;
    }
    .sidebar-content::-webkit-scrollbar { display: none; }

    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo-mark {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 22px;
      color: #fff;
      letter-spacing: -0.3px;
      display: block;
      line-height: 1.1;
    }

    .logo-sub {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.42);
      margin-top: 3px;
      display: block;
    }

    .nav-section {
      padding: 20px 16px 4px;
    }

    .nav-section-title {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      padding: 0 8px;
      margin-bottom: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      text-decoration: none;
      color: rgba(255,255,255,0.68);
      font-size: 13.5px;
      font-weight: 400;
      cursor: pointer;
      margin-bottom: 1px;
      border-left: 2px solid transparent;
      transition: color 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .nav-item:hover {
      color: rgba(255,255,255,0.95);
      background: rgba(255,255,255,0.07);
    }

    .nav-item.active {
      color: #fff;
      background: rgba(255,255,255,0.12);
      border-left-color: var(--accent);
      font-weight: 500;
    }

    .nav-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: 0.75;
    }
    .nav-item.active svg,
    .nav-item:hover svg {
      opacity: 1;
    }

    .nav-item-count {
      margin-left: auto;
      font-size: 10.5px;
      font-weight: 600;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      padding: 1px 6px;
      border-radius: 20px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 24px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-footer p {
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      margin: 0;
    }

    /* === MAIN AREA === */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* === HEADER / SEARCH === */
    #topbar {
      background: rgba(244,246,247,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(15,61,71,0.08);
      padding: 16px 32px;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-shrink: 0;
    }

    .search-wrap {
      position: relative;
      max-width: 560px;
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #8E97A0;
      pointer-events: none;
      width: 18px;
      height: 18px;
    }

    #search-input {
      width: 100%;
      padding: 12px 16px 12px 46px;
      border: 1.5px solid rgba(15,61,71,0.12);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #1C2327;
      background: #fff;
      box-shadow: 0 2px 12px rgba(15,61,71,0.06);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    #search-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(26,95,110,0.1), 0 2px 12px rgba(15,61,71,0.08);
    }

    #search-input::placeholder { color: #8E97A0; }

    #search-count {
      font-size: 12px;
      color: #8E97A0;
      margin-top: 6px;
      min-height: 18px;
    }

    /* === SCROLL CONTENT === */
    #scroll-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 32px 48px;
      scrollbar-width: thin;
      scrollbar-color: rgba(15,61,71,0.15) transparent;
    }

    #scroll-content::-webkit-scrollbar { width: 5px; }
    #scroll-content::-webkit-scrollbar-track { background: transparent; }
    #scroll-content::-webkit-scrollbar-thumb { background: rgba(15,61,71,0.15); border-radius: 10px; }

    /* === HERO === */
    #hero {
      margin-bottom: 32px;
    }

    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brand);
      margin-bottom: 6px;
    }

    .hero-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 34px;
      color: #1C2327;
      line-height: 1.15;
      margin: 0 0 10px;
      letter-spacing: -0.5px;
    }

    .hero-sub {
      font-size: 15px;
      color: #5A6472;
      margin: 0;
      max-width: 520px;
      line-height: 1.6;
    }

    /* === CATEGORY CARDS === */
    #categories {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 36px;
    }

    .cat-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      border: 1.5px solid rgba(15,61,71,0.07);
      box-shadow: 0 1px 3px rgba(15,61,71,0.05), 0 4px 12px rgba(15,61,71,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: block;
    }

    .cat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }

    .cat-card.logistiek::before { background: linear-gradient(90deg, #1A5F6E, #2A8FA8); }
    .cat-card.klantenservice::before { background: linear-gradient(90deg, #E8A020, #F0B840); }
    .cat-card.tools::before { background: linear-gradient(90deg, #3D6F6E, #5A9A98); }

    .cat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(15,61,71,0.12), 0 2px 8px rgba(15,61,71,0.08);
    }

    .cat-icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .cat-card.logistiek .cat-icon-wrap { background: rgba(26,95,110,0.1); color: #1A5F6E; }
    .cat-card.klantenservice .cat-icon-wrap { background: rgba(232,160,32,0.12); color: #C4841A; }
    .cat-card.tools .cat-icon-wrap { background: rgba(61,111,110,0.1); color: #3D6F6E; }

    .cat-icon-wrap svg { width: 20px; height: 20px; }

    .cat-title {
      font-size: 14px;
      font-weight: 600;
      color: #1C2327;
      margin: 0 0 3px;
    }

    .cat-count {
      font-size: 12px;
      color: #8E97A0;
    }

    /* === SECTION HEADER === */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 20px;
      color: #1C2327;
      margin: 0;
    }

    .section-count {
      font-size: 12px;
      font-weight: 500;
      color: #8E97A0;
      background: rgba(15,61,71,0.06);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* === GRID === */
    #content-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .item-card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      border: 1.5px solid rgba(15,61,71,0.07);
      box-shadow: 0 1px 3px rgba(15,61,71,0.05), 0 4px 12px rgba(15,61,71,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .item-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(15,61,71,0.12), 0 2px 8px rgba(15,61,71,0.08);
    }

    .item-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .item-icon-wrap {
      width: 44px;
      height: 44px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(26,95,110,0.09);
      color: #1A5F6E;
      flex-shrink: 0;
    }
    .item-icon-wrap.tools-icon { background: rgba(61,111,110,0.1); color: #3D6F6E; }
    .item-icon-wrap svg { width: 22px; height: 22px; }

    .item-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .badge-logistiek { background: rgba(26,95,110,0.1); color: #1A5F6E; }
    .badge-klantenservice { background: rgba(232,160,32,0.14); color: #C4841A; }
    .badge-tools { background: rgba(61,111,110,0.1); color: #3D6F6E; }

    .item-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 17px;
      color: #1C2327;
      margin: 0 0 7px;
      line-height: 1.25;
    }

    .item-desc {
      font-size: 13px;
      color: #5A6472;
      line-height: 1.6;
      margin: 0 0 16px;
    }

    .item-cta {
      font-size: 13px;
      font-weight: 600;
      color: var(--brand);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .item-cta svg { width: 14px; height: 14px; transition: transform 0.2s ease; }
    .item-card:hover .item-cta svg { transform: translateX(3px); }

    /* === EMPTY STATE === */
    #empty-state {
      text-align: center;
      padding: 64px 32px;
    }
    #empty-state .empty-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      color: #C8CDD2;
    }
    #empty-state h3 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 20px;
      color: #5A6472;
      margin: 0 0 8px;
    }
    #empty-state p {
      font-size: 14px;
      color: #8E97A0;
      margin: 0;
    }

    /* === ANIMATIONS === */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-card, .cat-card {
      animation: fadeUp 0.3s ease both;
    }

    /* === ACTIVE FILTER INDICATOR === */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .filter-chip {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .filter-chip.all { background: var(--brand); color: #fff; border-color: var(--brand); }
    .filter-chip:not(.active) { background: #fff; color: #5A6472; border-color: rgba(15,61,71,0.12); }
    .filter-chip:not(.active):hover { background: rgba(26,95,110,0.07); color: var(--brand); border-color: rgba(26,95,110,0.2); }
    .filter-chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  </style>
</head>
<body>

<div style="display:flex; height:100vh; overflow:hidden;">

  <!-- ===== SIDEBAR ===== -->
  <aside id="sidebar">
    <div class="sidebar-content">

      <div class="sidebar-logo">
        <span class="logo-mark">vienta</span>
        <span class="logo-sub">Kennisbank</span>
      </div>

      <nav id="sidebar-nav" style="flex:1; padding-top:8px;">
        <!-- Dynamisch gevuld via JS -->
      </nav>

      <div class="sidebar-footer">
        <p>Versie 1.0 &mdash; maart 2026</p>
      </div>

    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div id="main">

    <!-- Topbar / Search -->
    <div id="topbar">
      <div class="search-wrap">
        <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="Zoek handleidingen en tools..."
          autocomplete="off"
        >
      </div>
      <div id="search-count"></div>
    </div>

    <!-- Scrollable Content -->
    <div id="scroll-content">

      <!-- Hero -->
      <div id="hero">
        <p class="hero-eyebrow">Interne kennisbank</p>
        <h1 class="hero-title">Welkom bij Vienta</h1>
        <p class="hero-sub">Vind snel de handleidingen en tools die je nodig hebt. Gebruik de zoekbalk of blader per categorie.</p>
      </div>

      <!-- Categorie Cards -->
      <div id="categories">
        <!-- Dynamisch gevuld via JS -->
      </div>

      <!-- Filter bar -->
      <div class="filter-bar" id="filter-bar">
        <button class="filter-chip active" data-cat="all" onclick="setCategory('all', this)">Alles</button>
        <button class="filter-chip" data-cat="Klantenservice" onclick="setCategory('Klantenservice', this)">Klantenservice</button>
        <button class="filter-chip" data-cat="Logistiek" onclick="setCategory('Logistiek', this)">Logistiek</button>
        <button class="filter-chip" data-cat="Tools" onclick="setCategory('Tools', this)">Tools</button>
      </div>

      <!-- Section header -->
      <div class="section-header">
        <h2 class="section-title" id="grid-title">Alle handleidingen & tools</h2>
        <span class="section-count" id="grid-count"></span>
      </div>

      <!-- Grid -->
      <div id="content-grid"></div>

      <!-- Empty State -->
      <div id="empty-state" style="display:none;">
        <svg class="empty-icon" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 15.803M10.5 7.5v6m3-3h-6"/>
        </svg>
        <h3>Geen resultaten gevonden</h3>
        <p>Probeer een andere zoekterm of filter op categorie.</p>
      </div>

    </div>
  </div>
</div>

<script>
  // ── Data ──────────────────────────────────────────────────────────────
  let allItems = [];
  let currentCategory = 'all';
  let currentQuery = '';

  const CATEGORY_CONFIG = {
    'Logistiek':      { color: '#1A5F6E', bg: 'rgba(26,95,110,0.09)', badgeClass: 'badge-logistiek', cardClass: 'logistiek', iconClass: '' },
    'Klantenservice': { color: '#C4841A', bg: 'rgba(232,160,32,0.12)', badgeClass: 'badge-klantenservice', cardClass: 'klantenservice', iconClass: '' },
    'Tools':          { color: '#3D6F6E', bg: 'rgba(61,111,110,0.1)', badgeClass: 'badge-tools', cardClass: 'tools', iconClass: 'tools-icon' },
  };

  const CATEGORY_ICONS = {
    'Logistiek':      `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 01-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 00-3.213-9.193 2.056 2.056 0 00-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 00-10.026 0 1.106 1.106 0 00-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12"/></svg>`,
    'Klantenservice': `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 8.511c.884.284 1.5 1.128 1.5 2.097v4.286c0 1.136-.847 2.1-1.98 2.193-.34.027-.68.052-1.02.072v3.091l-3-3c-1.354 0-2.694-.055-4.02-.163a2.115 2.115 0 01-.825-.242m9.345-8.334a2.126 2.126 0 00-.476-.095 48.64 48.64 0 00-8.048 0c-1.131.094-1.976 1.057-1.976 2.192v4.286c0 .837.46 1.58 1.155 1.951m9.345-8.334V6.637c0-1.621-1.152-3.026-2.76-3.235A48.455 48.455 0 0011.25 3c-2.115 0-4.198.137-6.24.402-1.608.209-2.76 1.614-2.76 3.235v6.226c0 1.621 1.152 3.026 2.76 3.235.577.075 1.157.14 1.74.194V21l4.155-4.155"/></svg>`,
    'Tools':          `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l6.837-5.63m5.108-.233c.55-.164 1.163-.188 1.743-.14a4.5 4.5 0 004.486-6.336l-3.276 3.277a3.004 3.004 0 01-2.25-2.25l3.276-3.276a4.5 4.5 0 00-6.336 4.486c.091 1.076-.071 2.264-.904 2.95l-.102.085m-1.745 1.437L5.909 7.5H4.5L2.25 3.75l1.5-1.5L7.5 4.5v1.409l4.26 4.26m-1.745 1.437l1.745-1.437m6.615 8.206L15.75 15.75M4.867 19.125h.008v.008h-.008v-.008z"/></svg>`,
  };

  const ITEM_ICONS = {
    'package-open':   `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5l-.625 10.632a2.25 2.25 0 01-2.247 2.118H6.622a2.25 2.25 0 01-2.247-2.118L3.75 7.5M10 11.25h4M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125z"/></svg>`,
    'plus-circle':    `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
    'message-circle': `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/></svg>`,
    'scan-barcode':   `<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5zM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 01-1.125-1.125v-4.5zM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0113.5 9.375v-4.5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 6.75h.75v.75h-.75v-.75zM6.75 16.5h.75v.75h-.75v-.75zM16.5 6.75h.75v.75h-.75v-.75zM13.5 13.5h.75v.75h-.75v-.75zM13.5 18.75h.75v.75h-.75v-.75zM18.75 13.5h.75v.75h-.75v-.75zM18.75 18.75h.75v.75h-.75v-.75zM16.5 16.5h.75v.75h-.75v-.75z"/></svg>`,
  };

  // ── Fetch + Init ──────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch('data/guides.json');
      const data = await res.json();
      allItems = [...data.guides, ...data.tools];
      buildSidebar(data);
      buildCategoryCards(data);
      renderGrid(allItems);
    } catch(e) {
      console.error('Kan guides.json niet laden:', e);
    }
  }

  // ── Sidebar ───────────────────────────────────────────────────────────
  function buildSidebar(data) {
    const categories = ['Klantenservice', 'Logistiek'];
    const nav = document.getElementById('sidebar-nav');
    let html = '';

    // All items link
    html += `<div class="nav-section">
      <div class="nav-section-title">Overzicht</div>
      <a class="nav-item active" data-cat="all" onclick="setCategory('all', this); updateSidebarActive(this);" href="#" style="cursor:pointer;">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:15px;height:15px;"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
        Alle items
        <span class="nav-item-count">${allItems.length}</span>
      </a>
    </div>`;

    // Per category
    categories.forEach(cat => {
      const items = data.guides.filter(g => g.category === cat);
      if (!items.length) return;
      html += `<div class="nav-section">
        <div class="nav-section-title">${cat}</div>`;
      items.forEach(item => {
        const icon = ITEM_ICONS[item.icon] || ITEM_ICONS['package-open'];
        html += `<a class="nav-item" href="${item.url}" style="text-decoration:none;">
          ${icon}
          ${item.title}
        </a>`;
      });
      html += `</div>`;
    });

    // Tools
    if (data.tools.length) {
      html += `<div class="nav-section">
        <div class="nav-section-title">Tools</div>`;
      data.tools.forEach(tool => {
        const icon = ITEM_ICONS[tool.icon] || ITEM_ICONS['scan-barcode'];
        html += `<a class="nav-item" href="${tool.url}" style="text-decoration:none;">
          ${icon}
          ${tool.title}
        </a>`;
      });
      html += `</div>`;
    }

    nav.innerHTML = html;
  }

  function updateSidebarActive(el) {
    document.querySelectorAll('#sidebar-nav .nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
  }

  // ── Category Cards ────────────────────────────────────────────────────
  function buildCategoryCards(data) {
    const cats = [
      { key: 'Klantenservice', count: data.guides.filter(g => g.category === 'Klantenservice').length },
      { key: 'Logistiek',      count: data.guides.filter(g => g.category === 'Logistiek').length },
      { key: 'Tools',          count: data.tools.length },
    ];

    const el = document.getElementById('categories');
    el.innerHTML = cats.map(c => `
      <div class="cat-card ${c.key.toLowerCase()}" onclick="setCategory('${c.key}', null)" style="cursor:pointer;">
        <div class="cat-icon-wrap">${CATEGORY_ICONS[c.key]}</div>
        <div class="cat-title">${c.key}</div>
        <div class="cat-count">${c.count} item${c.count !== 1 ? 's' : ''}</div>
      </div>
    `).join('');
  }

  // ── Category Filter ───────────────────────────────────────────────────
  function setCategory(cat, chipEl) {
    currentCategory = cat;
    currentQuery = '';
    document.getElementById('search-input').value = '';

    // Update chips
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.cat === cat);
    });

    const filtered = cat === 'all' ? allItems : allItems.filter(i => i.category === cat);
    renderGrid(filtered);
    updateGridTitle(cat, filtered.length);
    showHero(cat === 'all');
    document.getElementById('search-count').textContent = '';
  }

  // ── Search ────────────────────────────────────────────────────────────
  let debounceTimer;
  document.getElementById('search-input').addEventListener('input', function(e) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => filterItems(e.target.value), 150);
  });

  function filterItems(query) {
    currentQuery = query;
    const q = query.toLowerCase().trim();

    if (!q) {
      const filtered = currentCategory === 'all' ? allItems : allItems.filter(i => i.category === currentCategory);
      renderGrid(filtered);
      updateGridTitle(currentCategory, filtered.length);
      document.getElementById('search-count').textContent = '';
      showHero(currentCategory === 'all');
      return;
    }

    showHero(false);
    let pool = currentCategory === 'all' ? allItems : allItems.filter(i => i.category === currentCategory);
    const results = pool.filter(item =>
      item.title.toLowerCase().includes(q) ||
      item.description.toLowerCase().includes(q) ||
      item.tags.some(t => t.includes(q)) ||
      item.category.toLowerCase().includes(q)
    );

    renderGrid(results);
    document.getElementById('search-count').textContent = results.length
      ? `${results.length} resultaat${results.length !== 1 ? 'en' : ''} voor "${query}"`
      : '';
    document.getElementById('grid-title').textContent = 'Zoekresultaten';
    document.getElementById('grid-count').textContent = `${results.length}`;
  }

  // ── Render Grid ───────────────────────────────────────────────────────
  function renderGrid(items) {
    const grid = document.getElementById('content-grid');
    const empty = document.getElementById('empty-state');

    if (!items.length) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = items.map((item, i) => buildCard(item, i)).join('');
  }

  function buildCard(item, index) {
    const cfg = CATEGORY_CONFIG[item.category] || CATEGORY_CONFIG['Tools'];
    const icon = ITEM_ICONS[item.icon] || ITEM_ICONS['package-open'];
    const delay = Math.min(index * 40, 200);

    return `
      <a href="${item.url}" class="item-card" style="animation-delay:${delay}ms;">
        <div class="item-card-top">
          <div class="item-icon-wrap ${cfg.iconClass}">${icon}</div>
          <span class="item-badge ${cfg.badgeClass}">${item.category}</span>
        </div>
        <div class="item-title">${item.title}</div>
        <div class="item-desc">${item.description}</div>
        <div class="item-cta">
          Openen
          <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/>
          </svg>
        </div>
      </a>
    `;
  }

  // ── Helpers ───────────────────────────────────────────────────────────
  function showHero(visible) {
    document.getElementById('hero').style.display = visible ? 'block' : 'none';
    document.getElementById('categories').style.display = visible ? 'grid' : 'none';
  }

  function updateGridTitle(cat, count) {
    const titleEl = document.getElementById('grid-title');
    const countEl = document.getElementById('grid-count');
    titleEl.textContent = cat === 'all' ? 'Alle handleidingen & tools' : cat;
    countEl.textContent = `${count}`;
  }

  // ── Boot ──────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
